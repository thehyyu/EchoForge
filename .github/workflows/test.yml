name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jest:
    name: Jest (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test

  pytest:
    name: pytest (Pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest requests python-dotenv psycopg[binary] beautifulsoup4
      - run: pytest pipeline/tests/ -v
